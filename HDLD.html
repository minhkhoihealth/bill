// ===== ĐỌC SỐ → CHỮ =====
function numberToVietnameseText(number) {
  const units = ["", "một", "hai", "ba", "bốn", "năm", "sáu", "bảy", "tám", "chín"];
  const scales = ["", "nghìn", "triệu", "tỷ"];

  function readThreeDigits(num) {
    let hundred = Math.floor(num / 100);
    let ten = Math.floor((num % 100) / 10);
    let unit = num % 10;
    let str = "";

    if (hundred > 0) str += units[hundred] + " trăm ";

    if (ten > 1) {
      str += units[ten] + " mươi ";
      if (unit === 1) str += "mốt ";
      else if (unit === 5) str += "lăm ";
      else if (unit > 0) str += units[unit] + " ";
    } else if (ten === 1) {
      str += "mười ";
      if (unit === 5) str += "lăm ";
      else if (unit > 0) str += units[unit] + " ";
    } else if (ten === 0 && unit > 0) {
      if (hundred > 0) str += "lẻ ";
      str += (unit === 5 ? "năm " : units[unit] + " ");
    }

    return str.trim();
  }

  if (number === 0) return "Không đồng";

  let result = "";
  let scaleIndex = 0;

  while (number > 0) {
    let chunk = number % 1000;
    if (chunk !== 0) {
      result = readThreeDigits(chunk) + " " + scales[scaleIndex] + " " + result;
    }
    number = Math.floor(number / 1000);
    scaleIndex++;
  }

  let text = result.trim().replace(/\s+/g, " ") + " đồng";
  return text.charAt(0).toUpperCase() + text.slice(1);
}
