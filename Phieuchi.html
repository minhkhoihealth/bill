<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phiếu Chi</title>

<style>
body {
  font-family: Arial, sans-serif;
  width: 148mm;
  height: 210mm;
  margin: 0 auto;
  padding: 10mm;
  font-size: 13px;
}

.header {
  display: flex;
  justify-content: space-between;
}

.left {
  width: 60%;
}

.right {
  width: 40%;
  text-align: right;
}

.logo {
  max-height: 60px;
  margin-bottom: 5px;
}

.title {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin: 10px 0;
}

.line {
  border-bottom: 1px dotted #000;
  display: inline-block;
  width: 100%;
}

.row {
  margin: 6px 0;
}

.sign {
  display: flex;
  justify-content: space-between;
  margin-top: 40px;
  text-align: center;
}

.sign div {
  width: 18%;
}

.small {
  font-size: 11px;
}
</style>
</head>

<body>

<div class="header">
  <div class="left">
    <img id="logo" class="logo">
    <div id="tencuahang"></div>
    <div id="diachicuahang"></div>
  </div>

  <div class="right">
    Mẫu số 01 - TT<br>
    TT 133/2016/TT-BTC
  </div>
</div>

<div class="title">PHIẾU CHI</div>

<div style="text-align:right;">
  Số: <b id="SoPhieu"></b><br>
</div>

<div style="margin-top:10px;">
  Ngày <b id="Ngay"></b> tháng <b id="Thang"></b> năm <b id="Nam"></b>
</div>

<div class="row">
  Họ tên người nhận: <span class="line" id="NguoiNhan"></span>
</div>

<div class="row">
  Địa chỉ: <span class="line" id="DiaChi"></span>
</div>

<div class="row">
  Lý do chi: <span class="line" id="LyDo"></span>
</div>

<div class="row">
  Số tiền: <span class="line" id="SoTien"></span>
</div>

<div class="row">
  (Viết bằng chữ): <span class="line" id="SoTienChu"></span>
</div>

<div class="row">
  Kèm theo: <span class="line" id="ChungTu"></span>
</div>

<div class="sign">
  <div>Giám đốc<br><span class="small">(Ký)</span></div>
  <div>Kế toán<br><span class="small">(Ký)</span></div>
  <div>Người nhận<br><span class="small">(Ký)</span></div>
  <div>Người lập<br><span class="small">(Ký)</span></div>
  <div>Thủ quỹ<br><span class="small">(Ký)</span></div>
</div>

<script>
function getParam(name) {
  const url = new URLSearchParams(window.location.search);
  return url.get(name) || "";
}

// format tiền
function formatMoney(n) {
  return Number(n || 0).toLocaleString("vi-VN") + " đ";
}

// đọc số thành chữ đơn giản
function numberToText(n) {
  return formatMoney(n) + " (bằng chữ)";
}

document.addEventListener("DOMContentLoaded", function () {

  document.getElementById("logo").src = getParam("logo");
  document.getElementById("tencuahang").innerText = getParam("tencuahang");
  document.getElementById("diachicuahang").innerText = getParam("diachicuahang");

  document.getElementById("SoPhieu").innerText = getParam("SoPhieu");
  document.getElementById("Ngay").innerText = getParam("Ngay");
  document.getElementById("Thang").innerText = getParam("Thang");
  document.getElementById("Nam").innerText = getParam("Nam");

  document.getElementById("NguoiNhan").innerText = getParam("NguoiNhan");
  document.getElementById("DiaChi").innerText = getParam("DiaChi");
  document.getElementById("LyDo").innerText = getParam("LyDo");

  let money = getParam("SoTien");

  document.getElementById("SoTien").innerText = formatMoney(money);
  document.getElementById("SoTienChu").innerText = numberToText(money);

  document.getElementById("ChungTu").innerText = getParam("ChungTu");

  // auto in
  setTimeout(() => window.print(), 500);

});
</script>

</body>
</html>
