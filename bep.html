<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phiếu Order Bếp</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  width: 76mm;
  margin: 0 auto;
  font-size: 15px;
  font-weight: 700;
}

.header{
  text-align:center;
  margin-bottom:6px;
}

.title{
  text-align:center;
  font-size:18px;
  font-weight:900;
  margin:6px 0;
}

.info{
  margin:4px 0;
  font-size:16px;
}

hr{
  border:none;
  border-top:1px dashed #000;
  margin:6px 0;
}

.item{
  padding:8px 0;
  border-bottom:1px dashed #000;
}

.name{
  font-size:18px;
  font-weight:900;
}

.footer{
  text-align:center;
  margin-top:10px;
  font-size:14px;
  font-weight:600;
}

.button-box{
  text-align:center;
  margin-top:10px;
}

button{
  padding:6px 12px;
  font-size:14px;
}

@media print{
  .button-box{ display:none; }
}
</style>
</head>

<body>

<div class="button-box">
  <button onclick="window.print()">🖨 In</button>
</div>

<div class="header">
  <div id="storeName"></div>
</div>

<div class="title">PHIẾU ORDER BẾP</div>

<div class="info"><strong>Số HĐ:</strong> <span id="orderId"></span></div>
<div class="info"><strong>Bàn:</strong> <span id="ban"></span></div>

<hr>

<div id="productList"></div>

<hr>

<div class="footer" id="datetime"></div>

<script>
const params = new URLSearchParams(window.location.search);

// ===== Thông tin cơ bản =====
document.getElementById("storeName").textContent =
  params.get("tencuahang") || "";

document.getElementById("orderId").textContent =
  params.get("id") || "";

document.getElementById("ban").textContent =
  params.get("ban") || "";

// ===== Danh sách món =====
const rawData = params.get("data") || "";
const data = decodeURIComponent(rawData).split("_n_");

let container = document.getElementById("productList");

data.forEach(row => {
  if (!row.trim()) return;

  // Format hiện tại: "Tên món||"
  const parts = row.split("|");
  const name = parts[0] || "";

  if (!name) return;

  let div = document.createElement("div");
  div.className = "item";
  div.innerHTML = `<div class="name">• ${name}</div>`;
  container.appendChild(div);
});

// ===== Thời gian in =====
document.getElementById("datetime").textContent =
  "Giờ in: " + new Date().toLocaleString("vi-VN");
</script>

</body>
</html>
