<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phiếu Order Bếp</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  width: 76mm;
  margin: 0 auto;
}

/* ===== 1 LIÊN ===== */
.bill{
  padding-bottom:10px;
}

.header{
  text-align:center;
  margin-bottom:6px;
  font-weight:700;
}

.title{
  text-align:center;
  font-size:18px;
  font-weight:900;
  margin:6px 0;
}

.order-id{
  font-size:13px;
}

.ban{
  font-size:14px;
  font-weight:400;
}

hr{
  border:none;
  border-top:1px dashed #000;
  margin:6px 0;
}

/* Nội dung món */
.item{
  padding:8px 0;
  border-bottom:1px dashed #000;
  font-family: "Times New Roman", Times, serif;
  font-size:18px;
  font-weight:bold;
  word-wrap: break-word;
}

.footer{
  text-align:center;
  margin-top:10px;
  font-size:13px;
}

/* Đường cắt */
.cut-line{
  border-top:2px dashed #000;
  margin:15px 0;
  text-align:center;
  font-size:12px;
}

.button-box{
  text-align:center;
  margin-top:10px;
}

button{
  padding:6px 12px;
  margin:4px;
  font-size:14px;
  cursor:pointer;
}

@media print{
  .button-box{ display:none; }
}
</style>
</head>

<body>

<div class="button-box">
  <button onclick="window.print()">🖨 In</button>
  <button onclick="closePage()">❌ Đóng</button>
</div>

<div id="billContainer"></div>

<script>
const params = new URLSearchParams(window.location.search);

function createBill(){

  const bill = document.createElement("div");
  bill.className = "bill";

  bill.innerHTML = `
    <div class="header">
      <div>${params.get("tencuahang") || ""}</div>
    </div>

    <div class="title">PHIẾU ORDER BẾP</div>

    <div class="order-id">Số HĐ: ${params.get("id") || ""}</div>
    <div class="ban">Bàn: ${params.get("ban") || ""}</div>

    <hr>

    <div class="productList"></div>

    <hr>

    <div class="footer">
      Giờ in: ${new Date().toLocaleString("vi-VN")}
    </div>
  `;

  const rawData = params.get("data") || "";
  const data = decodeURIComponent(rawData).split("_n_");
  const list = bill.querySelector(".productList");

  data.forEach(row => {
    if (!row.trim()) return;

    const parts = row.split("|");
    const name = parts[0] || "";
    const qty  = parts[1] || "";
    const note = parts[2] || "";

    if (!name) return;

    let text = "● " + name;
    if (qty) text += " : " + qty;
    if (note) text += " : " + note;

    const div = document.createElement("div");
    div.className = "item";
    div.textContent = text;

    list.appendChild(div);
  });

  return bill;
}

const container = document.getElementById("billContainer");

/* ===== TẠO 2 LIÊN ===== */
container.appendChild(createBill());

const cut = document.createElement("div");
cut.className = "cut-line";
cut.textContent = "✂ Cắt tại đây ✂";

container.appendChild(cut);

container.appendChild(createBill());

/* ===== TỰ ĐỘNG IN ===== */
window.onload = function(){
  setTimeout(() => {
    window.print();
  }, 500);
};

/* ===== ĐÓNG TRANG ===== */
function closePage(){
  window.close();
  setTimeout(() => {
    window.history.back();
  }, 300);
}
</script>

</body>
</html>
