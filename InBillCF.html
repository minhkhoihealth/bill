<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORDER BẾP</title>
<style>
body{font-family:Tahoma,Arial,sans-serif;width:76mm;margin:0 auto;font-size:13px;color:#000}
.button-box{text-align:center;margin:10px 0}
@media print{.button-box{display:none}}
button{padding:5px 10px}
.logo{text-align:center;margin:8px 0}
.logo img{max-width:140px;max-height:70px}
.store{text-align:center;font-weight:bold;font-size:18px}
.title{text-align:center;font-size:22px;font-weight:bold;margin:6px 0}
hr{border:none;border-top:2px solid #000}
.info{width:100%;border-collapse:collapse}
.info td{padding:2px 0}
.menu{width:100%;border-collapse:collapse;margin-top:8px}
.menu th{border-top:2px solid #000;border-bottom:2px solid #000;padding:6px 0}
.menu td{padding:6px 0;vertical-align:top}
.qty{text-align:center;width:45px;font-weight:bold}
.note{font-style:italic;font-size:12px;margin-left:10px}
.total{margin-top:6px;border-top:2px solid #000}
.total table{width:100%}
.total td{padding:4px 0;font-weight:bold}
.footer{text-align:center;margin-top:10px;font-size:12px}
</style>
</head>
<body>
<div class="button-box">
<button onclick="window.print()">🖨 In</button>
<button onclick="window.close()">Đóng</button>
</div>
<div class="logo"><img id="logo"></div>
<div class="store" id="storeName"></div>
<hr>
<div class="title">ORDER BẾP</div>

<table class="info">
<tr><td>Mã HĐ</td><td>: <span id="orderId"></span></td></tr>
<tr><td>Bàn</td><td>: <b id="ban" style="font-size:18px"></b></td></tr>
<tr><td>Nhân viên</td><td>: <span id="nhanvien"></span></td></tr>
<tr><td>Thời gian</td><td>: <span id="datetime"></span></td></tr>
</table>

<table class="menu">
<thead><tr><th align="left">MÓN</th><th class="qty">SL</th></tr></thead>
<tbody id="productBody"></tbody>
</table>

<div class="total">
<table>
<tr><td>TỔNG SỐ LƯỢNG</td><td align="right" id="totalQty"></td></tr>
<tr><td>TỔNG TIỀN BILL</td><td align="right" id="tongBill"></td></tr>
</table>
</div>

<div class="footer">Kitchen Order</div>

<script>
const p=new URLSearchParams(location.search);
const fm=n=>Number(n||0).toLocaleString('vi-VN');
const lg=p.get('logo');
if(lg&&lg.startsWith('http')) document.getElementById('logo').src=lg; else document.querySelector('.logo').style.display='none';
storeName.textContent=p.get('tencuahang')||'';
orderId.textContent=p.get('id')||'';
ban.textContent=p.get('ban')||'';
nhanvien.textContent=p.get('nhanvien')||'';
datetime.textContent=new Date().toLocaleString('vi-VN');
tongBill.textContent=fm(p.get('tongthanhtoan'));
let tq=0;
const rows=decodeURIComponent(p.get('data')||'').split('_n_');
rows.forEach(r=>{
 if(!r.trim())return;
 const a=r.split('|');
 const tr=document.createElement('tr');
 tq+=Number(a[3]||0);
 tr.innerHTML=`<td><div style="font-weight:bold">${(a[1]||'').toUpperCase()}</div>${a[2]?'<div class="note">+ '+a[2]+'</div>':''}</td><td class="qty">${a[3]||0}</td>`;
 productBody.appendChild(tr);
});
totalQty.textContent=tq;
</script>
</body></html>
