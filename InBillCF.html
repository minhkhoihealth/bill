<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>ORDER</title>
<style>
body{font-family:Tahoma,Arial;width:76mm;margin:auto;font-size:13px}
.logo{text-align:center}.logo img{max-width:140px;max-height:70px}
h1{text-align:center;font-size:24px;margin:4px 0}
table{width:100%;border-collapse:collapse}
.info td{padding:2px 0}
.menu th{border-top:2px solid #000;border-bottom:2px solid #000;padding:6px 0}
.menu td{padding:6px 0;vertical-align:top}
.qty{text-align:center;font-weight:bold;width:45px}
.note{font-style:italic;margin-left:10px;font-size:12px}
.total{border-top:2px solid #000;margin-top:8px}
.total td{padding:4px 0;font-weight:bold}
@media print{.btn{display:none}}
</style></head><body>
<div class="btn"><button onclick="print()">In</button></div>
<div class="logo"><img id="logo"></div>
<h1>ORDER PHA CHẾ</h1>
<table class="info">
<tr><td>Mã HĐ</td><td>: <span id="orderId"></span></td></tr>
<tr><td>Bàn</td><td>: <b id="ban" style="font-size:20px"></b></td></tr>
<tr><td>Nhân viên</td><td>: <span id="nhanvien"></span></td></tr>
<tr><td>Thời gian</td><td>: <span id="tg"></span></td></tr>
</table>
<table class="menu">
<thead><tr><th align="left">MÓN</th><th class="qty">SL</th></tr></thead>
<tbody id="body"></tbody>
</table>
<div class="total"><table>
<tr><td>TỔNG SỐ LƯỢNG</td><td align="right" id="sl"></td></tr>
<tr><td>TỔNG TIỀN BILL</td><td align="right" id="tong"></td></tr>
</table></div>
<script>
const p=new URLSearchParams(location.search);
const fm=n=>Number(n||0).toLocaleString('vi-VN');
const logo=p.get("logo");
if(logo&&logo.startsWith("http"))document.getElementById("logo").src=logo;else document.querySelector(".logo").style.display="none";
orderId.textContent=p.get("id")||"";
ban.textContent=p.get("ban")||"";
nhanvien.textContent=p.get("nhanvien")||"";
tg.textContent=new Date().toLocaleString("vi-VN");
tong.textContent=fm(p.get("tongthanhtoan"));
const groups={}; let totalQty=0;
(decodeURIComponent(p.get("data")||"").split("_n_")).forEach(r=>{
 if(!r.trim())return;
 const a=r.split("|");
 const name=(a[1]||"").trim(),note=(a[2]||"").trim(),qty=Number(a[3]||0);
 totalQty+=qty;
 const k=name+"|"+note;
 if(!groups[k])groups[k]={name,note,qty:0};
 groups[k].qty+=qty;
});
Object.values(groups).sort((a,b)=>a.name.localeCompare(b.name,"vi")).forEach(i=>{
 const tr=document.createElement("tr");
 tr.innerHTML=`<td><div style="font-weight:bold">${i.name.toUpperCase()}</div>${i.note?'<div class="note">+ '+i.note+'</div>':''}</td><td class="qty">${i.qty}</td>`;
 body.appendChild(tr);
});
sl.textContent=totalQty;
</script></body></html>
