<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phiếu xuất kho</title>

<style>
body{
  font-family: "Times New Roman", serif;
  font-size: 14px;
  width: 210mm;
  margin: auto;
}

.container{
  padding: 20px;
}

.header{
  display: flex;
  justify-content: space-between;
}

.center{text-align:center;}
.bold{font-weight:bold;}
.left{text-align:left;}

.table{
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
}

.table, .table th, .table td{
  border:1px solid black;
}

.table th, .table td{
  padding:5px;
  text-align:center;
}

.sign{
  display:flex;
  justify-content:space-between;
  margin-top:50px;
  text-align:center;
}

.logo{
  height:60px;
}
</style>
</head>

<body>
<div class="container">

<!-- HEADER -->
<div class="header">
  <div>
    <img id="logo" class="logo">
    <div id="DonVi" class="bold"></div>
    <div id="DiaChiCT"></div>
  </div>

  <div class="center">
    <div class="bold">Mẫu số 02 - VT</div>
    <div>(TT 133/2016/TT-BTC)</div>
  </div>
</div>

<!-- TITLE -->
<div class="center">
  <h2>PHIẾU XUẤT KHO</h2>
  <div>
    Ngày <span id="Ngay"></span>
    tháng <span id="Thang"></span>
    năm <span id="Nam"></span>
  </div>
  <div>Số: <b id="SoPhieu"></b></div>
</div>

<!-- INFO -->
<p>- Người nhận: <span id="NguoiNhan"></span></p>
<p>- Lý do xuất: <span id="LyDo"></span></p>

<!-- TABLE -->
<table class="table">
<tr>
  <th>STT</th>
  <th>Tên hàng</th>
  <th>SL</th>
  <th>Đơn giá</th>
  <th>Thành tiền</th>
</tr>

<tbody id="dsHang"></tbody>

<tr>
  <td colspan="4" class="bold">Cộng</td>
  <td id="TongTien"></td>
</tr>
</table>

<p><b>Tổng tiền (viết bằng chữ):</b> <span id="TienChu"></span></p>

<!-- SIGN -->
<div class="sign">
  <div>
    <div class="bold">Người lập</div>
    <div>(Ký, họ tên)</div>
  </div>

  <div>
    <div class="bold">Người nhận</div>
    <div>(Ký, họ tên)</div>
  </div>

  <div>
    <div class="bold">Thủ kho</div>
    <div>(Ký, họ tên)</div>
  </div>

  <div>
    <div class="bold">Kế toán</div>
    <div>(Ký, họ tên)</div>
  </div>

  <div>
    <div class="bold">Giám đốc</div>
    <div>(Ký, họ tên)</div>
  </div>
</div>

</div>

<script>
// ===== LẤY PARAM =====
function getParam(name){
  let url = new URL(window.location.href);
  return url.searchParams.get(name) || "";
}

// ===== FORMAT TIỀN =====
function formatMoney(x){
  return Number(x || 0).toLocaleString("vi-VN");
}

// ===== ĐỔI SỐ THÀNH CHỮ (ĐƠN GIẢN) =====
function numberToText(n){
  return formatMoney(n) + " đồng";
}

// ===== GÁN DỮ LIỆU =====
document.getElementById("DonVi").innerText = getParam("DonVi");
document.getElementById("DiaChiCT").innerText = getParam("DiaChiCT");
document.getElementById("SoPhieu").innerText = getParam("SoPhieu");

document.getElementById("Ngay").innerText = getParam("Ngay");
document.getElementById("Thang").innerText = getParam("Thang");
document.getElementById("Nam").innerText = getParam("Nam");

document.getElementById("NguoiNhan").innerText = getParam("NguoiNhan");
document.getElementById("LyDo").innerText = getParam("LyDo");

document.getElementById("logo").src = getParam("logo");

// ===== DANH SÁCH HÀNG (JSON) =====
// truyền dạng:
// &ds=[{"ten":"Nước","sl":2,"gia":5000},{"ten":"Bia","sl":1,"gia":10000}]
let ds = getParam("ds");

let tong = 0;
if(ds){
  let arr = JSON.parse(decodeURIComponent(ds));
  let html = "";

  arr.forEach((item, i)=>{
    let tt = item.sl * item.gia;
    tong += tt;

    html += `
    <tr>
      <td>${i+1}</td>
      <td class="left">${item.ten}</td>
      <td>${item.sl}</td>
      <td>${formatMoney(item.gia)}</td>
      <td>${formatMoney(tt)}</td>
    </tr>`;
  });

  document.getElementById("dsHang").innerHTML = html;
}

// ===== TỔNG =====
if(getParam("SoTien")){
  tong = Number(getParam("SoTien"));
}

document.getElementById("TongTien").innerText = formatMoney(tong);
document.getElementById("TienChu").innerText = numberToText(tong);

</script>

</body>
</html>
