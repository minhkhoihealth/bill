<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hóa đơn</title>

<style>
  .summary td{
border-bottom:1px dashed #999;
padding:6px 0;
}

.total{
font-size:18px;
font-weight:bold;
}
th{
border-bottom:2px solid #000;
padding:8px 5px;
font-size:14px;
white-space:normal;
}

td{
font-size:14px;
}

table{
table-layout:fixed;
}
@page{
size:A4 portrait;
margin:15mm;
}

body{
font-family:Arial;
max-width:210mm;
margin:auto;
color:#000;
}

.header{
text-align:center;
margin-bottom:10px;
}

.logo{
max-height:80px;
}

.store{
font-size:26px;
font-weight:bold;
}

.address,.phone{
font-size:14px;
}

.title{
text-align:center;
font-size:24px;
font-weight:bold;
margin:15px 0;
}

.info{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:15px;
}

hr{
border:none;
border-top:1px dashed #000;
margin:10px 0;
}

table{
width:100%;
border-collapse:collapse;
}

th{
border-bottom:2px solid #000;
padding:8px 0;
text-align:left;
}

td{
border-bottom:1px dashed #999;
padding:6px 0;
}

.center{
text-align:center;
}

.right{
text-align:right;
}

.daytotal{
background:#eee;
font-weight:bold;
}

.summary{
margin-top:10px;
width:100%;
}

.summary td{
padding:6px 0;
}

.total{
font-size:18px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:20px;
font-size:14px;
}

.button-box{
text-align:center;
margin-bottom:10px;
}

button{
padding:8px 14px;
margin:5px;
font-size:15px;
cursor:pointer;
}

@media print{
.button-box{display:none;}
}

</style>
</head>

<body>

<div class="button-box">
<button onclick="window.print()">🖨 In hóa đơn</button>
<button onclick="window.close()">❌ Đóng</button>
</div>

<div class="header">

<img id="logo" class="logo">

<div class="store" id="storeName"></div>

<div class="address" id="storeAddress"></div>

<div class="phone" id="storePhone"></div>

</div>

<div class="title">HÓA ĐƠN THANH TOÁN</div>

<div class="info">

<div>
Số HĐ: <span id="orderId"></span><br>
Khách: <span id="ten"></span>
</div>

<div>
Bàn/Phòng: <span id="ban"></span><br>
Nhân viên: <span id="nhanvien"></span>
</div>

</div>

<hr>

<table>

<thead>
<tr>

<th style="width:90px">Ngày<br>Date</th>

<th style="width:40px" class="center">
</th>

<th style="width:220px">
Tên món<br>Item
</th>

<th style="width:60px" class="center">
SL<br>Qty
</th>

<th style="width:90px" class="right">
Đơn giá<br>Price
</th>

<th style="width:100px" class="right">
Thành tiền<br>Sub Total
</th>

<th style="width:90px" class="right">
Giảm giá<br>Discount
</th>

<th style="width:100px" class="right">
Tổng tiền<br>Total
</th>

<th style="width:110px" class="right">
Thanh toán<br>Total Amount
</th>

</tr>
</thead>

<tbody id="productList"></tbody>

</table>

<tr>
<td colspan="7" class="right"><b>Giảm giá</b></td>
<td></td>
<td class="right" id="giamgia">0</td>
</tr>

<tr>
<td colspan="7" class="right"><b>Phụ thu</b></td>
<td></td>
<td class="right" id="phuthu">0</td>
</tr>

<tr>
<td colspan="7" class="right"><b>Thuế</b></td>
<td></td>
<td class="right" id="thue">0</td>
</tr>

<tr style="font-size:18px;font-weight:bold">
<td colspan="7" class="right">
TỔNG THANH TOÁN<br>
<small>Total Amount</small>
</td>
<td></td>
<td class="right" id="tong"></td>
</tr>


</table>

<hr>

<div class="footer">

<div id="bankInfo"></div>

<div id="datetime"></div>

<div style="margin-top:10px">
Cảm ơn quý khách và hẹn gặp lại!
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

/* STORE */

const logo=params.get("logo");
if(logo) document.getElementById("logo").src=logo;

storeName.textContent=params.get("tencuahang")||"";
storeAddress.textContent=params.get("diachicuahang")||"";
storePhone.textContent=params.get("dienthoaicuahang")||"";

/* INFO */

orderId.textContent=params.get("id")||"";
ban.textContent=params.get("ban")||"";
ten.textContent=params.get("ten")||"";
nhanvien.textContent=params.get("nhanvien")||"";

/* PRODUCTS */

const rawData=params.get("data")||"";
const rows=decodeURIComponent(rawData).split("_n_");

let table=document.getElementById("productList");

let groups={};

rows.forEach(row=>{

if(!row.trim()) return;

const p=row.split("|");

const date=p[0];
const name=p[1];
const note=p[2]||"";
const qty=Number(p[3]||0);
const price=Number(p[4]||0);
const total=Number(p[5]||qty*price);
const discount=Number(p[6]||0);
const finalTotal=Number(p[7]||total-discount);

if(!groups[date]) groups[date]=[];

groups[date].push({
name,
note,
qty,
price,
total,
discount,
finalTotal
});

});

/* RENDER */

let grandTotal=0;

Object.keys(groups).forEach(date=>{

let items=groups[date];

let dayTotal=0;

items.forEach(i=>dayTotal+=i.finalTotal);

grandTotal+=dayTotal;

items.forEach((item,index)=>{

let tr=document.createElement("tr");

let html="";

if(index==0){
html+=`<td rowspan="${items.length}" style="vertical-align:top;font-weight:bold">${date}</td>`;
}

html+=`<td class="center">${index+1}</td>`;

html+=`<td>
${item.name}
${item.note ? "<br><small>"+item.note+"</small>" : ""}
</td>`;

html+=`<td class="center">${item.qty}</td>`;

html+=`<td class="right">${item.price.toLocaleString()}</td>`;

html+=`<td class="right">${item.total.toLocaleString()}</td>`;

html+=`<td class="right">${item.discount.toLocaleString()}</td>`;

html+=`<td class="right">${item.finalTotal.toLocaleString()}</td>`;

if(index==0){
html+=`<td rowspan="${items.length}" class="right daytotal">${dayTotal.toLocaleString()}</td>`;
}

tr.innerHTML=html;

table.appendChild(tr);

});

});

/* SUMMARY */

const giamGia = Number(params.get("giamgia") || 0);
const phuThu = Number(params.get("phuthu") || 0);
const thueValue = Number(params.get("thue") || 0);

giamgia.textContent = giamGia.toLocaleString("vi-VN");
phuthu.textContent = phuThu.toLocaleString("vi-VN");
thue.textContent = thueValue.toLocaleString("vi-VN");

/* TÍNH TỔNG THANH TOÁN */

const tongThanhToan = grandTotal + phuThu + thueValue;

tong.textContent =
tongThanhToan.toLocaleString("vi-VN") + " VND";

/* BANK */

const bank=params.get("bank");
const stk=params.get("stk");
const chutk=params.get("chutk");

if(bank){
bankInfo.textContent="Chuyển khoản: "+bank+" | STK: "+stk+" | "+chutk;
}

/* TIME */

datetime.textContent="Thời gian: "+new Date().toLocaleString("vi-VN");

</script>

</body>
</html>
