<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hóa đơn</title>

<style>
table{width:100%;border-collapse:collapse;}
tr{page-break-inside:avoid;}
body{font-family:Arial;width:190mm;margin:auto;}
th{border-bottom:2px solid #000;padding:6px;font-size:11px;}
td{border-bottom:1px dashed #999;padding:6px;font-size:14px;}
.center{text-align:center;}
.right{text-align:right;}
.daytotal{background:#eee;font-weight:bold;}
.header{text-align:center;margin-bottom:10px;}
.logo{max-height:80px;}
.store{font-size:26px;font-weight:bold;}
.title{text-align:center;font-size:24px;margin:15px 0;}
.info{display:flex;justify-content:space-between;}
.summary td{border-bottom:1px dashed #999;}
.total{font-size:18px;font-weight:bold;}
.footer{text-align:center;margin-top:20px;}
.button-box{text-align:center;margin-bottom:10px;}
@media print{.button-box{display:none;}}
</style>
</head>

<body>

<div class="button-box">
<button onclick="window.print()">🖨 In hóa đơn</button>
<button onclick="window.close()">❌ Đóng</button>
</div>

<div class="header">
<img id="logo" class="logo">
<div class="store" id="storeName"></div>
<div id="storeAddress"></div>
<div id="storePhone"></div>
</div>

<div class="title">HÓA ĐƠN THANH TOÁN</div>

<div class="info">
<div>
Số HĐ: <span id="orderId"></span><br>
Khách: <span id="ten"></span>
</div>
<div>
Bàn/Phòng: <span id="ban"></span><br>
Nhân viên: <span id="nhanvien"></span>
</div>
</div>

<hr>

<table>
<thead>
<tr>
<th>Ngày</th>
<th></th>
<th>Tên sản phẩm</th>
<th>SL</th>
<th>Đơn giá</th>
<th>Thành tiền</th>
<th>Giảm</th>
<th>Tổng</th>
<th>Thanh toán</th>
</tr>
</thead>
<tbody id="productList"></tbody>
</table>

<table class="summary">

<tr id="row_giamgia">
<td colspan="8" class="right">Giảm giá:</td>
<td class="right" id="giamgia">0</td>
</tr>

<tr id="row_phuthu">
<td colspan="8" class="right">Phụ thu:</td>
<td class="right" id="phuthu">0</td>
</tr>

<tr id="row_thue">
<td colspan="8" class="right">Thuế:</td>
<td class="right" id="thue">0</td>
</tr>

<tr id="row_coc">
<td colspan="8" class="right">Cọc trước:</td>
<td class="right" id="coc">0</td>
</tr>

<tr class="total">
<td colspan="8" class="right">CÒN PHẢI THANH TOÁN</td>
<td class="right" id="tong"></td>
</tr>

</table>

<hr>

<div class="footer">
<div id="bankInfo"></div>
<div id="datetime"></div>
<div>Cảm ơn quý khách!</div>
</div>

<script>

/* ===== FIX NUMBER ===== */
function toNumber(value){
  if(!value) return 0;
  return Number(value.toString().replace(/[^0-9.-]/g,'')) || 0;
}

const params = new URLSearchParams(window.location.search);

/* STORE */
const logo=params.get("logo");
if(logo) document.getElementById("logo").src=logo;

storeName.textContent=params.get("tencuahang")||"";
storeAddress.textContent=params.get("diachicuahang")||"";
storePhone.textContent=params.get("dienthoaicuahang")||"";

/* INFO */
orderId.textContent=params.get("id")||"";
ban.textContent=params.get("ban")||"";
ten.textContent=params.get("ten")||"";
nhanvien.textContent=params.get("nhanvien")||"";

/* PRODUCTS */
const rawData=params.get("data")||"";
const rows=decodeURIComponent(rawData).split("_n_");

let table=document.getElementById("productList");
let groups={};

rows.forEach(row=>{
if(!row.trim()) return;

const p=row.split("|");

let date=p[0];
const name=p[1];
const note=p[2]||"";
const qty=toNumber(p[3]);
const price=toNumber(p[4]);
const total=toNumber(p[5]) || qty*price;
const discount=toNumber(p[6]);

// ✅ FIX QUAN TRỌNG (không dùng || nữa)
const finalTotal = (p[7] !== undefined && p[7] !== "")
  ? toNumber(p[7])
  : (total - discount);

if(!groups[date]) groups[date]=[];
groups[date].push({name,note,qty,price,total,discount,finalTotal});
});

/* ===== TÍNH TỔNG CHUẨN ===== */
let tongThanhToan = 0;

Object.values(groups).forEach(items=>{
  items.forEach(i=>{
    tongThanhToan += toNumber(i.finalTotal);
  });
});

/* SUMMARY PARAM */
const giamGia = toNumber(params.get("giamgia"));
const phuThu = toNumber(params.get("phuthu"));
const thueValue = toNumber(params.get("thue"));
const cocValue = toNumber(params.get("coc"));

tongThanhToan = tongThanhToan - giamGia + phuThu + thueValue;

let finalPay = tongThanhToan - cocValue;

/* HIỂN THỊ */
giamgia.textContent = giamGia.toLocaleString("vi-VN");
phuthu.textContent = phuThu.toLocaleString("vi-VN");
thue.textContent = thueValue.toLocaleString("vi-VN");
coc.textContent = cocValue.toLocaleString("vi-VN");

/* HIỂN THỊ TIỀN */
if(finalPay < 0){
  tong.textContent =  Math.abs(finalPay).toLocaleString("vi-VN") + " VND";
}else{
  tong.textContent = finalPay.toLocaleString("vi-VN") + " VND";
}

/* ẨN DÒNG = 0 */
if(giamGia === 0) row_giamgia.style.display="none";
if(phuThu === 0) row_phuthu.style.display="none";
if(thueValue === 0) row_thue.style.display="none";
if(cocValue === 0) row_coc.style.display="none";

/* ===== RENDER ===== */
Object.keys(groups).forEach(date=>{
let items=groups[date];
let dayTotal=0;

items.forEach(i=>dayTotal+=i.finalTotal);

items.forEach((item,index)=>{
let tr=document.createElement("tr");
let html="";

if(index==0){
html+=`<td rowspan="${items.length}">${date}</td>`;
}

html+=`<td class="center">${index+1}</td>`;
html+=`<td>${item.name}${item.note?"<br><small>"+item.note+"</small>":""}</td>`;
html+=`<td class="center">${item.qty}</td>`;
html+=`<td class="right">${item.price.toLocaleString()}</td>`;
html+=`<td class="right">${item.total.toLocaleString()}</td>`;
html+=`<td class="right">${item.discount.toLocaleString()}</td>`;
html+=`<td class="right">${item.finalTotal.toLocaleString()}</td>`;

if(index==0){
html+=`<td rowspan="${items.length}" class="right daytotal">${dayTotal.toLocaleString()}</td>`;
}

tr.innerHTML=html;
table.appendChild(tr);
});
});

/* BANK */
const bank=params.get("bank");
const stk=params.get("stk");
const chutk=params.get("chutk");

if(bank){
bankInfo.textContent="Chuyển khoản: "+bank+" | STK: "+stk+" | "+chutk;
}

/* TIME */
datetime.textContent="Thời gian: "+new Date().toLocaleString("vi-VN");

</script>

</body>
</html>
