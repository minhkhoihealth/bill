<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hóa đơn</title>

<style>

@page{
size:A4 portrait;
margin:15mm;
}

body{
font-family:Arial;
max-width:210mm;
margin:auto;
color:#000;
}

.header{
text-align:center;
margin-bottom:10px;
}

.logo{
max-height:80px;
}

.store{
font-size:26px;
font-weight:bold;
}

.address{
font-size:14px;
}

.phone{
font-size:14px;
}

.title{
text-align:center;
font-size:24px;
font-weight:bold;
margin:15px 0;
}

.info{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:15px;
}

hr{
border:none;
border-top:1px dashed #000;
margin:10px 0;
}

table{
width:100%;
border-collapse:collapse;
}

th{
border-bottom:2px solid #000;
padding:8px 0;
text-align:left;
}

td{
border-bottom:1px dashed #999;
padding:6px 0;
}

.center{
text-align:center;
}

.right{
text-align:right;
}

.daytotal{
background:#eee;
font-weight:bold;
}

.summary{
margin-top:10px;
width:100%;
}

.summary td{
padding:6px 0;
}

.total{
font-size:18px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:20px;
font-size:14px;
}

.button-box{
text-align:center;
margin-bottom:10px;
}

button{
padding:8px 14px;
margin:5px;
font-size:15px;
cursor:pointer;
}

@media print{
.button-box{display:none;}
}

</style>
</head>

<body>

<div class="button-box">
<button onclick="window.print()">🖨 In hóa đơn</button>
<button onclick="window.close()">❌ Đóng</button>
</div>

<div class="header">

<img id="logo" class="logo">

<div class="store" id="storeName"></div>

<div class="address" id="storeAddress"></div>

<div class="phone" id="storePhone"></div>

</div>

<div class="title">HÓA ĐƠN THANH TOÁN</div>

<div class="info">

<div>
Số HĐ: <span id="orderId"></span><br>
Khách: <span id="ten"></span>
</div>

<div>
Bàn/Phòng: <span id="ban"></span><br>
Nhân viên: <span id="nhanvien"></span>
</div>

</div>

<hr>

<table>

<thead>
<tr>
<th>Ngày</th>
<th style="width:40px">STT</th>
<th>Tên món</th>
<th class="center">SL</th>
<th class="right">Đơn giá</th>
<th class="right">Thành tiền</th>
<th class="right">Tổng tiền ngày</th>
</tr>
</thead>

<tbody id="productList"></tbody>

</table>

<table class="summary">

<tr>
<td class="right">Giảm giá:</td>
<td class="right" id="giamgia">0</td>
</tr>

<tr>
<td class="right">Phụ thu:</td>
<td class="right" id="phuthu">0</td>
</tr>

<tr>
<td class="right">Thuế:</td>
<td class="right" id="thue">0</td>
</tr>

<tr class="total">
<td class="right">TỔNG THANH TOÁN:</td>
<td class="right" id="tong"></td>
</tr>

</table>

<hr>

<div class="footer">

<div id="bankInfo"></div>

<div id="datetime"></div>

<div style="margin-top:10px">
Cảm ơn quý khách và hẹn gặp lại!
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

/* STORE */

const logo=params.get("logo");
if(logo) document.getElementById("logo").src=logo;

document.getElementById("storeName").textContent=params.get("tencuahang")||"";
document.getElementById("storeAddress").textContent=params.get("diachicuahang")||"";
document.getElementById("storePhone").textContent=params.get("dienthoaicuahang")||"";

/* INFO */

document.getElementById("orderId").textContent=params.get("id")||"";
document.getElementById("ban").textContent=params.get("ban")||"";
document.getElementById("ten").textContent=params.get("ten")||"";
document.getElementById("nhanvien").textContent=params.get("nhanvien")||"";

/* PRODUCTS */

const rawData=params.get("data")||"";
const rows=decodeURIComponent(rawData).split("_n_");

let table=document.getElementById("productList");

let groups={};

rows.forEach(row=>{

if(!row.trim()) return;

const p=row.split("|");

const date = p[0];
const name = p[1];
const note = p[2] || "";
const qty  = Number(p[3] || 0);
const price = Number(p[4] || 0);
const total = Number(p[5] || qty * price);

const total=qty*price;

if(!groups[date]) groups[date]=[];

groups[date].push({
name,qty,price,total
});

});

/* RENDER */

let grandTotal=0;

Object.keys(groups).forEach(date=>{

let items=groups[date];

let dayTotal=0;

items.forEach(i=>dayTotal+=i.total);

grandTotal+=dayTotal;

items.forEach((item,index)=>{

let tr=document.createElement("tr");

let html="";

if(index==0){
html+=`<td rowspan="${items.length}" style="vertical-align:top;font-weight:bold">${date}</td>`;
}

html+=`<td class="center">${index+1}</td>`;
html+=`<td>${item.name}${note ? "<br><small>"+note+"</small>" : ""}</td>`;
html+=`<td class="center">${item.qty}</td>`;
html+=`<td class="right">${item.price.toLocaleString()}</td>`;
html+=`<td class="right">${item.total.toLocaleString()}</td>`;

if(index==0){
html+=`<td rowspan="${items.length}" class="right daytotal">${dayTotal.toLocaleString()}</td>`;
}

tr.innerHTML=html;

table.appendChild(tr);

});

});

/* SUMMARY */

document.getElementById("giamgia").textContent=(params.get("giamgia")||0);
document.getElementById("phuthu").textContent=(params.get("phuthu")||0);
document.getElementById("thue").textContent=(params.get("thue")||0);

document.getElementById("tong").textContent=grandTotal.toLocaleString();

/* BANK */

const bank=params.get("bank");
const stk=params.get("stk");
const chutk=params.get("chutk");

if(bank){
document.getElementById("bankInfo").textContent=
"Chuyển khoản: "+bank+" | STK: "+stk+" | "+chutk;
}

/* TIME */

document.getElementById("datetime").textContent=
"Thời gian: "+new Date().toLocaleString("vi-VN");

</script>

</body>
</html>
