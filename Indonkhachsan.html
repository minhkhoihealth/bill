<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hóa đơn</title>

<style>

@page{
size:A4 portrait;
margin:15mm;
}

body{
font-family:Arial;
max-width:210mm;
margin:auto;
color:#000;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:10px;
}

.logo{
max-height:80px;
}

.store{
font-size:26px;
font-weight:bold;
}

.address{
font-size:14px;
}

.phone{
font-size:14px;
}

/* TITLE */

.title{
text-align:center;
font-size:24px;
font-weight:bold;
margin:15px 0;
}

/* INFO */

.info{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:15px;
}

hr{
border:none;
border-top:1px dashed #000;
margin:10px 0;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
border-bottom:2px solid #000;
padding:8px 0;
text-align:left;
}

td{
border-bottom:1px dashed #999;
padding:6px 0;
}

.center{
text-align:center;
}

.right{
text-align:right;
}

/* TOTAL */

.summary{
margin-top:10px;
width:100%;
}

.summary td{
padding:6px 0;
}

.total{
font-size:18px;
font-weight:bold;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:20px;
font-size:14px;
}

.button-box{
text-align:center;
margin-bottom:10px;
}

button{
padding:8px 14px;
margin:5px;
font-size:15px;
cursor:pointer;
}

@media print{
.button-box{display:none;}
}

</style>
</head>

<body>

<div class="button-box">
<button onclick="window.print()">🖨 In hóa đơn</button>
<button onclick="window.close()">❌ Đóng</button>
</div>

<div class="header">

<img id="logo" class="logo">

<div class="store" id="storeName"></div>

<div class="address" id="storeAddress"></div>

<div class="phone" id="storePhone"></div>

</div>

<div class="title">HÓA ĐƠN THANH TOÁN</div>

<div class="info">

<div>
Số HĐ: <span id="orderId"></span><br>
Khách: <span id="ten"></span>
</div>

<div>
Bàn/Phòng: <span id="ban"></span><br>
Nhân viên: <span id="nhanvien"></span>
</div>

</div>

<hr>

<table>

<thead>
<tr>
<th style="width:40px">STT</th>
<th>Tên món</th>
<th class="center">SL</th>
<th class="right">Đơn giá</th>
<th class="right">Thành tiền</th>
</tr>
</thead>

<tbody id="productList"></tbody>

</table>

<table class="summary">

<tr>
<td class="right">Giảm giá:</td>
<td class="right" id="giamgia">0</td>
</tr>

<tr>
<td class="right">Phụ thu:</td>
<td class="right" id="phuthu">0</td>
</tr>

<tr>
<td class="right">Thuế:</td>
<td class="right" id="thue">0</td>
</tr>

<tr class="total">
<td class="right">TỔNG THANH TOÁN:</td>
<td class="right" id="tong"></td>
</tr>

</table>

<hr>

<div class="footer">

<div id="bankInfo"></div>

<div id="datetime"></div>

<div style="margin-top:10px">
Cảm ơn quý khách và hẹn gặp lại!
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

/* STORE */

const logo = params.get("logo");
if(logo) document.getElementById("logo").src = logo;

document.getElementById("storeName").textContent =
params.get("tencuahang") || "";

document.getElementById("storeAddress").textContent =
params.get("diachicuahang") || "";

document.getElementById("storePhone").textContent =
params.get("dienthoaicuahang") || "";

/* INFO */

document.getElementById("orderId").textContent =
params.get("id") || "";

document.getElementById("ban").textContent =
params.get("ban") || "";

document.getElementById("ten").textContent =
params.get("ten") || "";

document.getElementById("nhanvien").textContent =
params.get("nhanvien") || "";

/* PRODUCTS */

const rawData = params.get("data") || "";
const rows = decodeURIComponent(rawData).split("_n_");

let table = document.getElementById("productList");

let lastDate = "";
let stt = 1;
let dayTotal = 0;

let buffer = [];

rows.forEach((row,i)=>{

if(!row.trim()) return;

const parts = row.split("|");

const date = parts[0];
const name = parts[1];
const qty = Number(parts[2] || 0);
const price = Number(parts[3] || 0);

const total = qty * price;

/* Nếu sang ngày mới */

if(lastDate && date !== lastDate){

buffer[buffer.length-1].dayTotal = dayTotal;

renderRows(buffer);

buffer = [];
dayTotal = 0;
stt = 1;

}

/* Lưu dòng */

buffer.push({
date: date,
stt: stt++,
name: name,
qty: qty,
price: price,
total: total,
dayTotal: ""
});

dayTotal += total;

lastDate = date;

});

/* ngày cuối */

if(buffer.length>0){

buffer[buffer.length-1].dayTotal = dayTotal;

renderRows(buffer);

}

function renderRows(rows){

rows.forEach((r,i)=>{

let tr = document.createElement("tr");

tr.innerHTML = `
<td>${i==0 ? r.date : ""}</td>
<td class="center">${r.stt}</td>
<td>${r.name}</td>
<td class="center">${r.qty}</td>
<td class="right">${r.price.toLocaleString()}</td>
<td class="right">${r.total.toLocaleString()}</td>
<td class="right">${r.dayTotal ? r.dayTotal.toLocaleString() : ""}</td>
`;

table.appendChild(tr);

});

}

/* SUMMARY */

document.getElementById("giamgia").textContent =
(params.get("giamgia")||0);

document.getElementById("phuthu").textContent =
(params.get("phuthu")||0);

document.getElementById("thue").textContent =
(params.get("thue")||0);

document.getElementById("tong").textContent =
(params.get("tongthanhtoan")||0);

/* BANK */

const bank=params.get("bank");
const stk=params.get("stk");
const chutk=params.get("chutk");

if(bank){
document.getElementById("bankInfo").textContent=
"Chuyển khoản: "+bank+" | STK: "+stk+" | "+chutk;
}

/* TIME */

document.getElementById("datetime").textContent=
"Thời gian: "+new Date().toLocaleString("vi-VN");

</script>

</body>
</html>
